services:
    artifact-server:
        image: ${NGINX_IMAGE}
        restart: unless-stopped
        ports:
            - "${ARTIFACT_SERVER_PORT}:80"
        volumes:
            - ./registry/artifacts:/usr/share/nginx/html/models:ro,Z
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -q -O /dev/null http://127.0.0.1/models/dp-record-metadata/0.0.2/route.json",
                ]
            interval: 5s
            timeout: 5s
            retries: 20

    postgres:
        image: ${POSTGRES_IMAGE}
        restart: unless-stopped
        ports:
            - "${POSTGRES_PORT}:5432"
        environment:
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB",
                ]
            interval: 5s
            timeout: 5s
            retries: 20

    dp-storage-jsondb-service:
        image: ${DP_STORAGE_IMAGE}
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
        ports:
            - "${DP_STORAGE_PORT}:8080"
        environment:
            SERVER_HOST: ${DP_STORAGE_SERVER_HOST}
            SERVER_PORT: ${DP_STORAGE_SERVER_PORT}
            DB_BACKEND: ${DB_BACKEND}
            DB_HOST: ${DB_HOST}
            DB_PORT: ${DB_PORT}
            DB_NAME: ${DB_NAME}
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            DB_POOL_SIZE: ${DB_POOL_SIZE}
            DB_TIMEOUT_MS: ${DB_TIMEOUT_MS}
            AUTH_MODE: ${DP_STORAGE_AUTH_MODE}
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "curl -fsS http://127.0.0.1:8080/ready >/dev/null",
                ]
            interval: 5s
            timeout: 5s
            retries: 20

    hex-core-service:
        image: ${HEX_CORE_IMAGE}
        restart: unless-stopped
        depends_on:
            artifact-server:
                condition: service_healthy
            dp-storage-jsondb-service:
                condition: service_healthy
        ports:
            - "${HEX_CORE_PORT}:8080"
        environment:
            SERVER_HOST: ${SERVER_HOST}
            SERVER_PORT: ${SERVER_PORT}
            SERVER_REQUEST_MAX_BYTES: ${SERVER_REQUEST_MAX_BYTES}
            LOG_LEVEL: ${LOG_LEVEL}
            METRICS_ENABLED: ${METRICS_ENABLED}
            REGISTRY_MODE: ${REGISTRY_MODE}
            REGISTRY_CATALOG_FILE: ${REGISTRY_CATALOG_FILE}
            REGISTRY_ALLOWED_HOSTS: ${REGISTRY_ALLOWED_HOSTS}
            REGISTRY_REQUIRE_HTTPS: ${REGISTRY_REQUIRE_HTTPS}
            REGISTRY_CACHE_ENABLED: ${REGISTRY_CACHE_ENABLED}
            REGISTRY_CACHE_TTL_SECS: ${REGISTRY_CACHE_TTL_SECS}
            IO_ADAPTER_ID: ${IO_ADAPTER_ID}
            IO_ADAPTER_VERSION: ${IO_ADAPTER_VERSION}
            IO_ADAPTER_BASE_URL: ${IO_ADAPTER_BASE_URL}
            IO_ADAPTER_TIMEOUT_MS: ${IO_ADAPTER_TIMEOUT_MS}
            AUTH_MODE: ${AUTH_MODE}
            AUTH_ALLOW_INSECURE_NONE: ${AUTH_ALLOW_INSECURE_NONE}
            AUTH_NONE_SUBJECT: ${AUTH_NONE_SUBJECT}
            AUTH_NONE_ROLES: ${AUTH_NONE_ROLES}
            AUTH_NONE_SCOPES: ${AUTH_NONE_SCOPES}
        volumes:
            - ./registry/catalog.json:/config/registry/catalog.json:ro,Z
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "curl -fsS http://127.0.0.1:8080/admin/ready >/dev/null",
                ]
            interval: 5s
            timeout: 5s
            retries: 20

    demo-runner:
        build:
            context: ../demo/runner
        image: ${DEMO_RUNNER_IMAGE}
        depends_on:
            hex-core-service:
                condition: service_healthy
            dp-storage-jsondb-service:
                condition: service_healthy
        environment:
            DEMO_BASE_URL: ${DEMO_BASE_URL}
            DEMO_MODEL: ${DEMO_MODEL}
            DEMO_VERSION: ${DEMO_VERSION}
        volumes:
            - ../payloads:/payloads:ro,Z

volumes:
    postgres_data:
